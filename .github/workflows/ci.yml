name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JavaScript 代码质量检查
  # ═══════════════════════════════════════════════════════════════
  lint-javascript:
    name: Lint JavaScript
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run Prettier check
      run: npm run format:check

    - name: Run code quality check
      run: npm run quality

  # ═══════════════════════════════════════════════════════════════
  # Python 代码质量检查
  # ═══════════════════════════════════════════════════════════════
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy

    - name: Run Ruff
      run: ruff check .

    - name: Run Black check
      run: black --check .

    - name: Run MyPy
      run: mypy api/ desktop_app.py server.py --ignore-missing-imports

  # ═══════════════════════════════════════════════════════════════
  # JavaScript 测试
  # ═══════════════════════════════════════════════════════════════
  test-javascript:
    name: Test JavaScript
    runs-on: ubuntu-latest
    needs: lint-javascript

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage/lcov.info
        flags: javascript
        name: javascript-coverage

  # ═══════════════════════════════════════════════════════════════
  # Python 测试
  # ═══════════════════════════════════════════════════════════════
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests
      run: pytest -v --tb=short

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml
        flags: python
        name: python-coverage

  # ═══════════════════════════════════════════════════════════════
  # 构建应用
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Application
    runs-on: ${{ matrix.os }}
    needs: [lint-javascript, lint-python, test-javascript, test-python]
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: MechForgeAI.exe
            asset_name: MechForgeAI-windows.exe
          - os: ubuntu-latest
            artifact_name: MechForgeAI
            asset_name: MechForgeAI-linux
          - os: macos-latest
            artifact_name: MechForgeAI
            asset_name: MechForgeAI-macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build application
      run: python build.py --build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: dist/
        retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # 安全检查
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Run Bandit
      run: |
        pip install bandit
        bandit -r api/ desktop_app.py server.py -f json -o bandit-report.json || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, python

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ═══════════════════════════════════════════════════════════════
  # 依赖更新检查
  # ═══════════════════════════════════════════════════════════════
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Dependency Review
      uses: actions/dependency-review-action@v3
      with:
        fail-on-severity: moderate
