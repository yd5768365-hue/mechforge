# 自动同步到 GitCode
# 需要在 GitHub 仓库设置中配置 Secrets:
# - GITCODE_TOKEN: GitCode 的访问令牌 (需要 write_repository 权限)
# - GITCODE_USERNAME: GitCode 用户名 (可选，默认与 GitHub 相同)

name: Sync to GitCode

on:
  push:
    branches: [main, develop]
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史
          persist-credentials: false  # 使用自定义凭证

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Add GitCode remote
        run: |
          # GitCode 仓库地址格式: https://gitcode.com/用户名/仓库名.git
          # 请根据实际情况修改仓库路径
          GITCODE_REPO="${{ vars.GITCODE_REPO || '你的GitCode用户名/mechforge_ai' }}"
          git remote add gitcode "https://${{ secrets.GITCODE_USERNAME || github.actor }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${GITCODE_REPO}.git"

      - name: Push to GitCode
        run: |
          # 获取当前分支名
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Syncing branch: $CURRENT_BRANCH"

          # 推送当前分支到 GitCode
          git push gitcode "$CURRENT_BRANCH" --force-with-lease

          # 如果是 main 分支，也同步所有标签
          if [ "$CURRENT_BRANCH" = "main" ]; then
            echo "Syncing tags..."
            git push gitcode --tags --force-with-lease 2>/dev/null || echo "No tags to sync"
          fi

      - name: Cleanup
        if: always()
        run: |
          # 清理远程配置，避免泄露 token
          git remote remove gitcode 2>/dev/null || true