          <line class="flow-line" x1="85%" y1="55%" x2="70%" y2="70%" stroke="url(#lineGradient)" stroke-width="0.8"/>

          <circle class="node" cx="70%" cy="70%" r="4" fill="url(#nodeGlow)"/>

  <!-- Experience Library -->
  <!-- 添加书籍弹窗逻辑 -->
  <script>
    let selectedFile = null;
    let selectedTags = [];
    let selectedBackend = 'local';

    function openAddBookModal() {
      const modal = document.getElementById('addBookModal');
      if (modal) modal.classList.add('active');
    }
    function closeAddBookModal() {
      const modal = document.getElementById('addBookModal');
      if (modal) modal.classList.remove('active');
      resetModal();
    }
    function closeModalOutside(e) {
      if (e.target.id === 'addBookModal') closeAddBookModal();
    }

    function selectBackend(btn) {
      document.querySelectorAll('.backend-option').forEach(el => el.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBackend = btn.dataset.backend;
      const hint = document.getElementById('backend-hint');
      if (hint) {
        hint.textContent = selectedBackend === 'ragflow'
          ? '使用 RAGFlow 云端解析，支持 OCR、表格、公式识别（需配置 RAGFlow）'
          : '使用本地 ChromaDB 向量数据库，无需外部服务';
      }
    }

    function resetModal() {
      selectedFile = null;
      selectedTags = [];
      selectedBackend = 'local';
      // 重置后端选择器
      document.querySelectorAll('.backend-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.backend === 'local');
      });
      const hint = document.getElementById('backend-hint');
      if (hint) hint.textContent = '使用本地 ChromaDB 向量数据库，无需外部服务';
      const titleEl = document.getElementById('bookTitle');
      if (titleEl) titleEl.value = '';
      const authorEl = document.getElementById('bookAuthor');
      if (authorEl) authorEl.value = '';
      const editionEl = document.getElementById('bookEdition');
      if (editionEl) editionEl.value = '';
      const fileInput = document.getElementById('fileInput');
      if (fileInput) fileInput.value = '';
      const selectedFileName = document.getElementById('selectedFileName');
      if (selectedFileName) selectedFileName.style.display = 'none';
      const progressSection = document.getElementById('progressSection');
      if (progressSection) progressSection.style.display = 'none';
      const progressFill = document.getElementById('progressFill');
      if (progressFill) progressFill.style.width = '0%';
      const confirmBtn = document.getElementById('confirmBtn');
      if (confirmBtn) confirmBtn.disabled = false;
      document.querySelectorAll('.tag-option.selected').forEach(el => el.classList.remove('selected'));
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) setSelectedFile(file);
    }
    function handleDrop(event) {
      event.preventDefault();
      const uploadZone = document.getElementById('uploadZone');
      if (uploadZone) uploadZone.classList.remove('dragover');
      const file = event.dataTransfer.files[0];
      if (file) setSelectedFile(file);
    }
    function handleDragOver(event) {
      event.preventDefault();
      const uploadZone = document.getElementById('uploadZone');
      if (uploadZone) uploadZone.classList.add('dragover');
    }
    function handleDragLeave() {
      const uploadZone = document.getElementById('uploadZone');
      if (uploadZone) uploadZone.classList.remove('dragover');
    }
    function setSelectedFile(file) {
      selectedFile = file;
      const el = document.getElementById('selectedFileName');
      if (el) {
        el.textContent = '📎 ' + file.name + ' (' + (file.size/1024/1024).toFixed(2) + ' MB)';
        el.style.display = 'block';
      }
      const titleEl = document.getElementById('bookTitle');
      if (!titleEl.value) {
        titleEl.value = file.name.replace(/\.[^.]+$/, '');
      }
    }

    function toggleTag(el) {
      el.classList.toggle('selected');
      selectedTags = Array.from(document.querySelectorAll('.tag-option.selected')).map(e => e.dataset.tag);
    }

    async function submitBook() {
      const title = document.getElementById('bookTitle').value.trim();
      if (!title) {
        const titleEl = document.getElementById('bookTitle');
        titleEl.style.borderColor = '#ff4d6d';
        setTimeout(() => titleEl.style.borderColor = '', 2000);
        return;
      }
      if (!selectedFile) {
        alert('请先选择书籍文件');
        return;
      }

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('title', title);
      formData.append('author', document.getElementById('bookAuthor').value.trim());
      formData.append('edition', document.getElementById('bookEdition').value.trim());
      formData.append('tags', JSON.stringify(selectedTags));
      formData.append('backend', selectedBackend);

      document.getElementById('progressSection').style.display = 'block';
      document.getElementById('confirmBtn').disabled = true;
      setProgress(10, '上传文件中...');

      try {
        const response = await fetch('/api/rag/add_book', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          if (result.doc_id && selectedBackend === 'ragflow') {
            // RAGFlow 模式：异步解析，开始轮询
            setProgress(60, 'RAGFlow 解析中...');
            await pollParseStatus(result.doc_id);
          } else {
            // Embedded 模式：同步完成
            setProgress(100, '入库完成！');
            setTimeout(() => {
              closeAddBookModal();
              if (typeof loadBooks === 'function') loadBooks();
            }, 800);
          }
        } else {
          throw new Error(result.message || '添加失败');
        }
      } catch (err) {
        document.getElementById('progressText').textContent = '❌ 错误：' + err.message;
        document.getElementById('confirmBtn').disabled = false;
      }
    }

    async function pollParseStatus(docId) {
      const maxAttempts = 60; // 最多等 5 分钟
      for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 5000)); // 每 5 秒查一次
        try {
          const res = await fetch('/api/rag/parse_status/' + docId);
          const data = await res.json();

          const pct = Math.min(60 + Math.floor(i / maxAttempts * 35), 95);
          setProgress(pct, 'RAGFlow 解析中... (' + (data.status || 'UNKNOWN') + ')');

          if (data.done) {
            setProgress(100, '解析完成，已入库 ✓');
            setTimeout(() => {
              closeAddBookModal();
              if (typeof loadBooks === 'function') loadBooks();
            }, 1000);
            return;
          }
          if (data.status === 'FAIL') {
            document.getElementById('progressText').textContent = '❌ RAGFlow 解析失败';
            document.getElementById('confirmBtn').disabled = false;
            return;
          }
        } catch (e) {
          console.error('轮询解析状态失败:', e);
        }
      }
      document.getElementById('progressText').textContent = '⚠️ 解析超时，可在 RAGFlow 控制台查看';
      document.getElementById('confirmBtn').disabled = false;
    }

    function setProgress(pct, text) {
      const progressFill = document.getElementById('progressFill');
      if (progressFill) progressFill.style.width = pct + '%';
      const progressText = document.getElementById('progressText');
      if (progressText) progressText.textContent = text;
      const progressPct = document.getElementById('progressPct');
      if (progressPct) progressPct.textContent = pct + '%';
    }

    // 打开 RAGFlow 向导
    async function openRagflowWizard() {
      // 构建完整的向导 URL
      const wizardUrl = window.location.origin + '/ragflow_wizard.html';
      if (window.pywebview && window.pywebview.api) {
        await window.pywebview.api.open_wizard(wizardUrl);
      } else {
        // 开发模式下直接打开新窗口
        window.open(wizardUrl, '_blank', 'width=720,height=720');
      }
    }

    // ══════════════════════════════════════════════════════════════════════════════
    // Obsidian 同步功能
    // ══════════════════════════════════════════════════════════════════════════════

    // 打开 Obsidian 同步面板
    async function openObsidianSyncPanel() {
      const modal = document.getElementById('obsidian-sync-modal');
      if (modal) {
        modal.classList.add('active');
        // 加载当前状态
        await loadObsidianStatus();
      }
    }

    // 关闭 Obsidian 同步面板
    function closeObsidianSyncPanel(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      const modal = document.getElementById('obsidian-sync-modal');
      if (modal) {
        modal.classList.remove('active');
      }
    }

    // 选择 Obsidian Vault 文件夹
    async function selectObsidianVault() {
      if (window.pywebview && window.pywebview.api) {
        const vaultPath = await window.pywebview.api.select_folder('选择 Obsidian Vault 文件夹');
        if (vaultPath) {
          document.getElementById('setting-obsidian-vault').value = vaultPath;
        }
      }
    }

    // 加载 Obsidian 状态
    async function loadObsidianStatus() {
      try {
        const response = await fetch('/api/obsidian/status');
        const data = await response.json();

        // 更新 UI
        const statusText = document.getElementById('obsidian-status-text');
        const totalNotes = document.getElementById('obsidian-total-notes');
        const syncedNotes = document.getElementById('obsidian-synced-notes');
        const unsyncedNotes = document.getElementById('obsidian-unsynced-notes');
        const vaultInput = document.getElementById('setting-obsidian-vault');

        if (data.configured) {
          vaultInput.value = data.vault_path || '';
          if (data.accessible) {
            statusText.textContent = '已连接';
            statusText.className = 'status-value sync-badge configured';
            totalNotes.textContent = data.total_notes || 0;
            syncedNotes.textContent = data.synced_notes || 0;
            unsyncedNotes.textContent = data.unsynced_notes || 0;
          } else {
            statusText.textContent = '路径无效';
            statusText.className = 'status-value sync-badge not-configured';
            totalNotes.textContent = '-';
            syncedNotes.textContent = '-';
            unsyncedNotes.textContent = '-';
          }
        } else {
          statusText.textContent = '未配置';
          statusText.className = 'status-value sync-badge not-configured';
          vaultInput.value = '';
          totalNotes.textContent = '-';
          syncedNotes.textContent = '-';
          unsyncedNotes.textContent = '-';
        }
      } catch (error) {
        console.error('加载 Obsidian 状态失败:', error);
      }
    }

    // 保存 Obsidian 配置
    async function saveObsidianConfig() {
      const vaultPath = document.getElementById('setting-obsidian-vault').value;
      if (!vaultPath) {
        alert('请先选择 Obsidian Vault 路径');
        return;
      }

      try {
        const response = await fetch('/api/obsidian/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vault_path: vaultPath })
        });
        const data = await response.json();

        if (data.success) {
          addObsidianLog('配置已保存', 'success');
          await loadObsidianStatus();
        } else {
          addObsidianLog('配置保存失败: ' + (data.detail || '未知错误'), 'error');
        }
      } catch (error) {
        console.error('保存 Obsidian 配置失败:', error);
        addObsidianLog('配置保存失败: ' + error.message, 'error');
      }
    }

    // 从 Obsidian 拉取笔记
    async function pullFromObsidian() {
      const pullBtn = document.getElementById('btn-obsidian-pull');
      pullBtn.disabled = true;
      pullBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 拉取中...';

      addObsidianLog('开始拉取 Obsidian 笔记...', 'info');

      try {
        const response = await fetch('/api/obsidian/pull', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subfolder: '' })
        });
        const data = await response.json();

        if (data.error) {
          addObsidianLog('拉取失败: ' + data.error, 'error');
        } else {
          addObsidianLog(`拉取完成: 新增 ${data.new}, 更新 ${data.updated}, 跳过 ${data.skipped}, 失败 ${data.failed}`, 'success');
          // 刷新状态
          await loadObsidianStatus();
        }
      } catch (error) {
        console.error('拉取笔记失败:', error);
        addObsidianLog('拉取失败: ' + error.message, 'error');
      } finally {
        pullBtn.disabled = false;
        pullBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg> 拉取笔记';
      }
    }

    // 打开推送到 Obsidian 模态框
    function openPushToObsidianModal() {
      const modal = document.getElementById('push-obsidian-modal');
      if (modal) {
        modal.classList.add('active');
      }
    }

    // 关闭推送到 Obsidian 模态框
    function closePushToObsidianModal(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      const modal = document.getElementById('push-obsidian-modal');
      if (modal) {
        modal.classList.remove('active');
      }
      // 清空表单
      document.getElementById('push-title').value = '';
      document.getElementById('push-tags').value = '';
      document.getElementById('push-content').value = '';
    }

    // 推送到 Obsidian
    async function pushToObsidian() {
      const title = document.getElementById('push-title').value.trim();
      const tagsStr = document.getElementById('push-tags').value.trim();
      const folder = document.getElementById('push-folder').value.trim() || 'MechForge';
      const content = document.getElementById('push-content').value.trim();

      if (!title) {
        alert('请输入笔记标题');
        return;
      }
      if (!content) {
        alert('请输入笔记内容');
        return;
      }

      const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];

      addObsidianLog(`正在推送笔记: ${title}...`, 'info');

      try {
        const response = await fetch('/api/obsidian/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: title,
            content: content,
            tags: tags,
            target_folder: folder
          })
        });
        const data = await response.json();

        if (data.success) {
          addObsidianLog(`推送成功: ${data.path}`, 'success');
          closePushToObsidianModal();
        } else {
          addObsidianLog('推送失败: ' + (data.detail || '未知错误'), 'error');
        }
      } catch (error) {
        console.error('推送笔记失败:', error);
        addObsidianLog('推送失败: ' + error.message, 'error');
      }
    }

    // 添加日志
    function addObsidianLog(message, type = 'info') {
      const logContent = document.getElementById('obsidian-log-content');
      if (!logContent) return;

      const time = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.className = `log-${type}`;
      logEntry.textContent = `[${time}] ${message}`;

      logContent.appendChild(logEntry);
      logContent.scrollTop = logContent.scrollHeight;
    }

    window.openObsidianSyncPanel = openObsidianSyncPanel;
    window.closeObsidianSyncPanel = closeObsidianSyncPanel;
    window.selectObsidianVault = selectObsidianVault;
    window.saveObsidianConfig = saveObsidianConfig;
    window.pullFromObsidian = pullFromObsidian;
    window.openPushToObsidianModal = openPushToObsidianModal;
    window.closePushToObsidianModal = closePushToObsidianModal;
    window.pushToObsidian = pushToObsidian;

    // ══════════════════════════════════════════════════════════════════════════════
    // 书籍阅读器功能
    // ══════════════════════════════════════════════════════════════════════════════

    let currentBookId = '';
    let currentBookTitle = '';
    let bookQAHistory = [];

    // 打开书籍阅读器
    async function openBookReader(bookId, title) {
      currentBookId = bookId;
      currentBookTitle = title;
      document.getElementById('reader-title').textContent = '阅读: ' + title;

      const modal = document.getElementById('book-reader-modal');
      const contentEl = document.getElementById('reader-content');
      const chaptersEl = document.getElementById('reader-chapters');

      modal.classList.add('active');
      contentEl.innerHTML = '<div class="reader-loading">正在加载书籍内容...</div>';
      chaptersEl.innerHTML = '';

      try {
        const resp = await fetch('/api/knowledge/book_content/' + encodeURIComponent(bookId));
        const data = await resp.json();

        // 显示章节导航
        if (data.chapters && data.chapters.length > 0) {
          chaptersEl.innerHTML = '<div class="chapter-list">' +
            data.chapters.map(ch => '<span class="chapter-item">' + escapeHtml(ch) + '</span>').join('') +
            '</div>';
        }

        // 显示内容
        contentEl.innerHTML = '<div class="markdown-body">' + data.content + '</div>';
      } catch (e) {
        contentEl.innerHTML = '<div class="reader-error">加载失败: ' + e.message + '</div>';
      }
    }

    // 关闭书籍阅读器
    function closeBookReader(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      document.getElementById('book-reader-modal').classList.remove('active');
    }

    // 打开书籍问答
    function openBookQA(bookId, title) {
      currentBookId = bookId;
      currentBookTitle = title;
      bookQAHistory = [];
      document.getElementById('qa-title').textContent = '问答: ' + title;
      document.getElementById('qa-messages').innerHTML = '<div class="qa-welcome">你好！我是《' + title + '》的阅读助手。请提出关于这本书的问题。</div>';
      document.getElementById('qa-input').value = '';
      document.getElementById('book-qa-modal').classList.add('active');
    }

    // 关闭书籍问答
    function closeBookQA(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      document.getElementById('book-qa-modal').classList.remove('active');
    }

    // 向书籍提问
    async function askBook() {
      const input = document.getElementById('qa-input');
      const question = input.value.trim();
      if (!question) return;

      const messagesEl = document.getElementById('qa-messages');

      // 添加用户问题
      messagesEl.innerHTML += '<div class="qa-message qa-user">' + escapeHtml(question) + '</div>';

      // 清空输入
      input.value = '';

      // 添加加载中提示
      const loadingEl = document.createElement('div');
      loadingEl.className = 'qa-message qa-loading';
      loadingEl.textContent = '思考中...';
      messagesEl.appendChild(loadingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // 更新历史
      bookQAHistory.push({ role: 'user', content: question });

      try {
        const resp = await fetch('/api/knowledge/ask_book', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            book_id: currentBookId,
            question: question,
            history: bookQAHistory
          })
        });

        // 处理 SSE 流式响应
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let answer = '';

        loadingEl.textContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') {
                loadingEl.remove();
                // 添加 AI 回答
                messagesEl.innerHTML += '<div class="qa-message qa-assistant">' + answer + '</div>';
                bookQAHistory.push({ role: 'assistant', content: answer });
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return;
              }
              try {
                const json = JSON.parse(data);
                if (json.content) {
                  answer += json.content;
                  loadingEl.textContent = answer + '▌';
                } else if (json.error) {
                  loadingEl.textContent = '错误: ' + json.error;
                }
              } catch (e) {
                // 忽略解析错误
              }
            }
          }
        }
      } catch (e) {
        loadingEl.textContent = '请求失败: ' + e.message;
      }
    }

    // 暴露函数到全局
    window.openBookReader = openBookReader;
    window.closeBookReader = closeBookReader;
    window.openBookQA = openBookQA;
    window.closeBookQA = closeBookQA;
    window.askBook = askBook;
  </script>

  <!-- 用户知识库 JavaScript -->
  <script>
  const TAG_COLORS = {
    '力学':  '#00d4ff', '材料':  '#7b2ff7', '设计':  '#ffd166',
    '制造':  '#00ff88', '热力学':'#ff6b35', '控制':  '#a78bfa',
    '有限元':'#34d399', '流体':  '#38bdf8', '摩擦学':'#fb923c',
  };
  const TAG_ICONS = {
    '力学':'⚙️','材料':'🔬','设计':'📐','制造':'🔧',
    '热力学':'🔥','控制':'🎛️','有限元':'📊','流体':'💧','摩擦学':'⚡',
  };

  async function refreshUserBooks() {
    const btn  = document.getElementById('refresh-btn');
    const grid = document.getElementById('user-book-grid');

    if (!btn || !grid) return;

    btn.classList.add('spinning');
    btn.disabled = true;

    grid.innerHTML = Array(4).fill(0)
      .map(() => '<div class="book-skeleton"></div>').join('');

    try {
      const res = await fetch('/api/knowledge/list');
      const books = await res.json();
      renderUserBooks(books);
      showToast('已加载 ' + books.length + ' 本书籍', 'success');
    } catch {
      const demo = [
        { id:'1', title:'机械设计手册', author:'闻邦椿', edition:'第6版', tags:['设计'], chunks:1420 },
        { id:'2', title:'材料力学',     author:'刘鸿文', edition:'第6版', tags:['力学'], chunks:980  },
        { id:'3', title:'工程热力学',   author:'曾丹苓', edition:'第5版', tags:['热力学'], chunks:620 },
        { id:'4', title:'有限元分析',   author:'王勖成', edition:'第2版', tags:['有限元'], chunks:530 },
      ];
      renderUserBooks(demo);
      showToast('已加载 ' + demo.length + ' 本书籍', 'success');
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }

  function renderUserBooks(books) {
    const grid  = document.getElementById('user-book-grid');
    const count = document.getElementById('user-book-count');

    if (!grid) return;

    // 确保 books 是数组
    if (!Array.isArray(books)) {
      books = [];
    }

    if (count) count.textContent = books.length + ' 本';

    if (!books.length) {
      grid.innerHTML = '<div class="kb-empty-state"><div class="kb-empty-icon">📂</div><div class="kb-empty-text">还没有添加书籍</div><div class="kb-empty-sub">点击「添加书籍」导入 PDF 或文本文件</div></div>';
      return;
    }

    grid.innerHTML = books.map(b => {
      const tag   = (b.tags || [])[0] || '其他';
      const color = TAG_COLORS[tag] || '#00d4ff';
      const icon  = TAG_ICONS[tag]  || '📘';
      return '<div class="user-book-card" style="--card-color:' + color + '" onclick="openBook(\'' + b.id + '\')"><div class="card-status ready"></div><div class="card-icon">' + icon + '</div><div class="card-title">' + b.title + '</div><div class="card-author">' + (b.author || '未知作者') + '</div><div class="card-tag" style="background:' + color + '1a;color:' + color + ';border-color:' + color + '33">' + tag + '</div><div class="card-chunks">' + (b.chunks || 0) + ' 个片段</div></div>';
    }).join('');
  }

  let _toastTimer;
  function showToast(msg, type) {
    type = type || '';
    const t = document.getElementById('kb-toast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'kb-toast show ' + type;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.className = 'kb-toast', 2500);
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(refreshUserBooks, 500);
  });
  </script>
